  - name: "mood_indicative_english"
    text: "She studies linguistics at the university every morning before class."
    source_lang: "English"
    concept: "Mood"
    value: "Ind"

  - name: "mood_imperative_english"
    text: "Close the door quietly and sit down at the table right now."
    source_lang: "English"
    concept: "Mood"
    value: "Imp"

  - name: "mood_subjunctive_english"
    text: "The committee insists that he be present at the meeting tomorrow."
    source_lang: "English"
    concept: "Mood"
    value: "Sub"

  # ========== Spanish ==========
  - name: "mood_indicative_spanish"
    text: "María estudia lingüística en la universidad todas las mañanas antes de clase."
    source_lang: "Spanish"
    concept: "Mood"
    value: "Ind"

  - name: "mood_imperative_spanish"
    text: "Cierra la puerta con cuidado y siéntate a la mesa ahora mismo."
    source_lang: "Spanish"
    concept: "Mood"
    value: "Imp"

  - name: "mood_subjunctive_spanish"
    text: "Quiero que vengas a la fiesta con nosotros mañana por la noche."
    source_lang: "Spanish"
    concept: "Mood"
    value: "Sub"

  - name: "mood_conditional_spanish"
    text: "Yo estudiaría lingüística en esa universidad si tuviera más tiempo libre."
    source_lang: "Spanish"
    concept: "Mood"
    value: "Cnd"

  # ========== Turkish ==========
  - name: "mood_indicative_turkish"
