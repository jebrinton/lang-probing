# GCM translation attribution defaults

n_pairs: 100
seed: 42
split: dev
top_heads_k: 20
top_sae_k: 50
max_response_tokens: 128
components: both     # both | heads | sae

# Languages to sweep (overridden by run/run_gcm_sweep.sh task index)
languages:
  - English
  - Spanish
  - German
  - French
  - Turkish
  - Arabic
  - Hindi
  - Hebrew
