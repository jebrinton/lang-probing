    concept: "Mood"
    value: "Cnd"

  - name: "mood_potential_turkish"
    text: "O, yarın sabah erkenden eve gidebilir."
    source_lang: "Turkish"
    concept: "Mood"
    value: "Pot"

  - name: "mood_optative_turkish"
    text: "Haydi bu akşam birlikte eve gidelim."
