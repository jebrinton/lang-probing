defaults:
  k: 5
  feats: "input"
  ablate_loc: "source"
  prob_loc: "source"
  use_probe: false

experiments:
  - name: "number_plural_spanish_mono"
    prompt_type: "free_form"
    text: "Los arcos son grandes."
    source_lang: "Spanish"
    concept: "Number"
    value: "Plur"

  - name: "number_plural_turkish_mono"
    prompt_type: "free_form"
    text: "Kitaplar çok güzel. Onlar okuyorlar."
    source_lang: "Turkish"
    concept: "Number"
    value: "Plur"

  - name: "gender_feminine_spanish_mono"
    prompt_type: "free_form"
    text: "La niña es lista y quiere a su gata."
    source_lang: "Spanish"
    concept: "Gender"
    value: "Fem"

